name: micropython-release

on:
  push:
    branches:
      - main
    paths:
      - 'micropython/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tags and commit log

      - name: Determine next version
        id: version
        run: |
          # Get the latest semver tag (e.g. v1.0.1)
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v1.0.0"
          else
            # Strip the 'v' prefix, split into major.minor.patch
            VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

            # Bump the minor version, reset patch
            MINOR=$((MINOR + 1))
            PATCH=0
            NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "Next release: ${NEXT_TAG}"

      - name: Build release notes from commits
        id: notes
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            # No previous tag — use all commits touching micropython/
            LOG=$(git log --oneline -- micropython/ | head -30)
          else
            LOG=$(git log "${LATEST_TAG}..HEAD" --oneline -- micropython/ | head -30)
          fi

          # Write multi-line output using a delimiter
          {
            echo "body<<RELEASE_EOF"
            echo "## MicroPython Firmware Changes"
            echo ""
            echo "Changes to the \`micropython/\` directory since the last release:"
            echo ""
            echo "$LOG" | while IFS= read -r line; do
              echo "- ${line}"
            done
            echo ""
            echo "---"
            echo "*This release was automatically generated by GitHub Actions.*"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Package micropython directory
        run: |
          cd micropython
          zip -r "../micropython-firmware-${{ steps.version.outputs.tag }}.zip" . \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".DS_Store" \
            -x "tests/*" \
            -x "system.log" \
            -x "system.log.old" \
            -x "config.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "MicroPython Firmware ${{ steps.version.outputs.tag }}"
          body: ${{ steps.notes.outputs.body }}
          files: micropython-firmware-${{ steps.version.outputs.tag }}.zip
          draft: false
          prerelease: false
